<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priya Seva Center | Admin Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; background-color: #f8fafc; } </style>
</head>
<body class="p-8">

    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-slate-900"><i class="fa-solid fa-spider text-rose-600 mr-2"></i>Admin Spiderweb</h1>
                <p class="text-slate-500 text-sm mt-1">Manage all client requests and statuses from one place.</p>
            </div>
            <button onclick="loadData()" class="bg-slate-900 text-white px-4 py-2 rounded-lg hover:bg-slate-800 transition shadow-md">
                <i class="fa-solid fa-rotate-right mr-2"></i>Refresh Data
            </button>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left text-sm">
                <thead class="bg-slate-50 text-slate-600 uppercase font-semibold text-xs border-b border-slate-200">
                    <tr>
                        <th class="px-6 py-4">ID & Date</th>
                        <th class="px-6 py-4">Client Details</th>
                        <th class="px-6 py-4">Service Required</th>
                        <th class="px-6 py-4">Current Status</th>
                        <th class="px-6 py-4 text-right">Action</th>
                    </tr>
                </thead>
                <tbody id="dataTable" class="divide-y divide-slate-100">
                    <tr><td colspan="5" class="px-6 py-8 text-center text-slate-400">Click "Refresh Data" to load database.</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="statusModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-xl w-96 shadow-2xl">
            <h3 class="font-bold text-lg mb-4">Update Status</h3>
            <p class="text-xs text-slate-500 mb-2">Changing status for <span id="modalId" class="font-bold text-rose-600"></span></p>
            <select id="newStatus" class="w-full border border-slate-300 rounded-lg p-2 mb-6 outline-none focus:border-slate-900">
                <option value="Pending">Pending</option>
                <option value="Active">Active</option>
                <option value="Canceled">Canceled</option>
                <option value="Completed">Completed</option>
            </select>
            <div class="flex space-x-3">
                <button onclick="closeModal()" class="flex-1 bg-slate-100 text-slate-700 py-2 rounded-lg font-semibold hover:bg-slate-200">Cancel</button>
                <button onclick="saveStatus()" class="flex-1 bg-rose-600 text-white py-2 rounded-lg font-semibold hover:bg-rose-700">Save</button>
            </div>
        </div>
    </div>

    <script>
        // --- PASTE YOUR DEPLOYED GOOGLE APPS SCRIPT URL HERE ---
        const WEB_APP_URL = "YOUR_WEB_APP_URL_HERE"; 
        
        let currentEditingId = null;

        async function loadData() {
            const table = document.getElementById('dataTable');
            table.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-slate-400"><i class="fa-solid fa-spinner fa-spin mr-2"></i>Loading live data...</td></tr>`;
            
            try {
                const response = await fetch(WEB_APP_URL + "?action=admin");
                const data = await response.json();
                
                table.innerHTML = '';
                if(data.length === 0) {
                    table.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-slate-400">No bookings found in the database.</td></tr>`;
                    return;
                }

                data.forEach(row => {
                    let statusColor = "bg-yellow-100 text-yellow-700";
                    if(row.status === "Active") statusColor = "bg-green-100 text-green-700";
                    if(row.status === "Canceled") statusColor = "bg-red-100 text-red-700";
                    if(row.status === "Completed") statusColor = "bg-blue-100 text-blue-700";

                    table.innerHTML += `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="px-6 py-4"><span class="font-bold text-slate-900">${row.id}</span><br><span class="text-xs text-slate-400">${new Date(row.date).toLocaleDateString()}</span></td>
                        <td class="px-6 py-4"><span class="font-semibold">${row.name}</span><br><span class="text-slate-500">${row.phone}</span><br><span class="text-xs text-slate-400">Pin: ${row.pin}</span></td>
                        <td class="px-6 py-4"><span class="font-semibold text-rose-600">${row.category}</span><br><span class="text-xs text-slate-500">${row.subs}</span><br><span class="text-xs text-slate-400">Starts: ${row.start}</span></td>
                        <td class="px-6 py-4"><span class="px-3 py-1 rounded-full text-xs font-bold ${statusColor}">${row.status}</span></td>
                        <td class="px-6 py-4 text-right">
                            <button onclick="openModal('${row.id}', '${row.status}')" class="text-slate-400 hover:text-slate-900 transition"><i class="fa-solid fa-pen-to-square text-lg"></i></button>
                        </td>
                    </tr>`;
                });
            } catch (error) {
                table.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-red-500">Error loading data. Check your Web App URL.</td></tr>`;
            }
        }

        function openModal(id, currentStatus) {
            currentEditingId = id;
            document.getElementById('modalId').innerText = id;
            document.getElementById('newStatus').value = currentStatus;
            document.getElementById('statusModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('statusModal').classList.add('hidden');
            currentEditingId = null;
        }

        async function saveStatus() {
            const newStatus = document.getElementById('newStatus').value;
            const btn = event.target;
            btn.innerText = "Saving...";
            
            await fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "updateStatus", id: currentEditingId, newStatus: newStatus })
            });
            
            closeModal();
            loadData(); // Refresh the table automatically
        }
    </script>
</body>
</html>
